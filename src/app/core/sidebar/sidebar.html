<aside [class.w-64]="!isMinimized" [class.w-20]="isMinimized" class="flex flex-col h-screen sticky top-0 left-0 border-r-0 bg-surface-container-low font-['Inter'] antialiased tracking-tight z-20 transition-all duration-300">
  <div class="p-6 pb-2 overflow-hidden flex items-center min-h-[5rem]" [ngClass]="isMinimized ? 'justify-center' : 'justify-between gap-2'">
    <div *ngIf="!isMinimized" class="flex flex-col overflow-hidden">
      <h1 class="text-xl font-black text-[#142588] dark:text-indigo-300 whitespace-nowrap truncate">Precision</h1>
      <p class="text-[10px] uppercase tracking-widest text-slate-500 font-medium whitespace-nowrap">Terminal 04</p>
    </div>
    
    <button (click)="toggleSidebar()" class="p-2 text-[#142588] dark:text-indigo-300 hover:text-[#142588] transition-colors rounded-full hover:bg-[#e4e9ed] dark:hover:bg-slate-800 shrink-0 flex items-center justify-center -mr-2" [ngClass]="isMinimized ? 'scale-110' : ''">
      <span class="material-symbols-outlined text-2xl transition-transform duration-300">menu</span>
    </button>
  </div>
  
  <nav class="flex-1 px-4 space-y-2 overflow-x-hidden">
    <a routerLink="/dashboard" routerLinkActive="bg-white dark:bg-slate-700 text-[#142588] dark:text-white font-bold shadow-sm translate-x-1" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 px-4 py-3 text-slate-500 dark:text-slate-400 hover:text-[#142588] hover:bg-[#e4e9ed] dark:hover:bg-slate-800 transition-all duration-200 rounded-xl overflow-hidden group">
      <span class="material-symbols-outlined shrink-0 group-hover:scale-110 transition-transform">dashboard</span>
      <span *ngIf="!isMinimized" class="whitespace-nowrap">Dashboard</span>
    </a>
    <a routerLink="/billing" routerLinkActive="bg-white dark:bg-slate-700 text-[#142588] dark:text-white font-bold shadow-sm translate-x-1" class="flex items-center gap-3 px-4 py-3 text-slate-500 dark:text-slate-400 hover:text-[#142588] hover:bg-[#e4e9ed] dark:hover:bg-slate-800 transition-all duration-200 rounded-xl overflow-hidden group">
      <span class="material-symbols-outlined shrink-0 group-hover:scale-110 transition-transform">receipt_long</span>
      <span *ngIf="!isMinimized" class="whitespace-nowrap">Billing</span>
    </a>
    <a routerLink="/inventory" routerLinkActive="bg-white dark:bg-slate-700 text-[#142588] dark:text-white font-bold shadow-sm translate-x-1" class="flex items-center gap-3 px-4 py-3 text-slate-500 dark:text-slate-400 hover:text-[#142588] hover:bg-[#e4e9ed] dark:hover:bg-slate-800 transition-all duration-200 rounded-xl overflow-hidden group">
      <span class="material-symbols-outlined shrink-0 group-hover:scale-110 transition-transform">inventory_2</span>
      <span *ngIf="!isMinimized" class="whitespace-nowrap">Inventory</span>
    </a>
    <a routerLink="/tax-reports" routerLinkActive="bg-white dark:bg-slate-700 text-[#142588] dark:text-white font-bold shadow-sm translate-x-1" class="flex items-center gap-3 px-4 py-3 text-slate-500 dark:text-slate-400 hover:text-[#142588] hover:bg-[#e4e9ed] dark:hover:bg-slate-800 transition-all duration-200 rounded-xl overflow-hidden group">
      <span class="material-symbols-outlined shrink-0 group-hover:scale-110 transition-transform">analytics</span>
      <span *ngIf="!isMinimized" class="whitespace-nowrap">Reports</span>
    </a>
    <a routerLink="/vendor" routerLinkActive="bg-white dark:bg-slate-700 text-[#142588] dark:text-white font-bold shadow-sm translate-x-1" class="flex items-center gap-3 px-4 py-3 text-slate-500 dark:text-slate-400 hover:text-[#142588] hover:bg-[#e4e9ed] dark:hover:bg-slate-800 transition-all duration-200 rounded-xl overflow-hidden group">
      <span class="material-symbols-outlined shrink-0 group-hover:scale-110 transition-transform">local_shipping</span>
      <span *ngIf="!isMinimized" class="whitespace-nowrap">Vendors</span>
    </a>
    <a routerLink="/employee" routerLinkActive="bg-white dark:bg-slate-700 text-[#142588] dark:text-white font-bold shadow-sm translate-x-1" class="flex items-center gap-3 px-4 py-3 text-slate-500 dark:text-slate-400 hover:text-[#142588] hover:bg-[#e4e9ed] dark:hover:bg-slate-800 transition-all duration-200 rounded-xl overflow-hidden group">
      <span class="material-symbols-outlined shrink-0 group-hover:scale-110 transition-transform">badge</span>
      <span *ngIf="!isMinimized" class="whitespace-nowrap">Employees</span>
    </a>
  </nav>

  <div class="p-4 mt-auto space-y-4">
    <!-- User Profile -->
    <div class="flex items-center p-3 bg-surface-container-low rounded-xl overflow-hidden" [ngClass]="isMinimized ? 'justify-center' : 'gap-3'">
      <img alt="Store Manager Profile" class="w-10 h-10 rounded-full object-cover shrink-0" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDd_Ri1o5h8zxafm9dKFQ_upJ9ig4qokSYabp9ZOyeabuC_5yU6VC45ifC4lHJdF2TIW_bxP7i7M-y_SLQTR_-mRlSCLgN3Z4wltBA8PFlmDwt2yWAM8ejLqdoYuHavYviNm0IcXMKzteDWFWPpeki8HkRvdylRwUw5IZLMLoXztwJoUb7Ea0kvzTmoHeAsTtHcg7v2RIgmGuuFe_s6gFeoHDFhzx4iHmmPR6MgxptPMK5wIUyYSYf707GT8FFuHxXsFj_0ph0ygTY"/>
      <div *ngIf="!isMinimized" class="whitespace-nowrap overflow-hidden">
        <p class="text-sm font-bold text-on-surface truncate">Alex Rivera</p>
        <p class="text-[10px] uppercase tracking-widest text-slate-500">Administrator</p>
      </div>
    </div>
  </div>
</aside>
