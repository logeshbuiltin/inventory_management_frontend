<main class="flex-grow flex items-center justify-center p-6 -mt-12 h-[calc(100vh-100px)]">
  <div class="w-full max-w-5xl flex flex-col md:flex-row gap-0 overflow-hidden rounded-xl matte-card bg-surface-container-lowest">
    <!-- Left Side: Standard Login -->
    <div class="flex-1 p-10 md:p-16 border-r border-surface-container-low">
      <div class="mb-10">
        <h1 class="text-on-surface text-3xl font-extrabold tracking-tight mb-2">Terminal Access</h1>
        <p class="text-on-surface-variant text-sm font-medium">Enter your credentials to manage Precision POS.</p>
      </div>
      <form class="space-y-6" (ngSubmit)="onLogin()">
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2">Store ID</label>
          <div class="relative">
            <input class="w-full bg-surface-container-high border-none rounded-xl px-4 py-4 text-on-surface focus:ring-0 focus:ring-offset-0 border-b-2 border-transparent focus:border-primary transition-all placeholder:text-outline/50" placeholder="TX-9902-A" type="text"/>
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2">Username/Email</label>
          <input class="w-full bg-surface-container-high border-none rounded-xl px-4 py-4 text-on-surface focus:ring-0 focus:ring-offset-0 border-b-2 border-transparent focus:border-primary transition-all placeholder:text-outline/50" placeholder="admin@tactile.system" type="email"/>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant mb-2">Password</label>
          <input class="w-full bg-surface-container-high border-none rounded-xl px-4 py-4 text-on-surface focus:ring-0 focus:ring-offset-0 border-b-2 border-transparent focus:border-primary transition-all placeholder:text-outline/50" placeholder="••••••••" type="password"/>
        </div>
        <div class="flex items-center justify-between pt-2">
          <a class="text-xs font-bold text-primary hover:underline transition-all" href="javascript:void(0)">Forgot Password</a>
          <a class="text-xs font-bold text-secondary hover:underline transition-all" href="javascript:void(0)">Register New Store</a>
        </div>
        <button class="w-full bg-primary text-on-primary py-5 rounded-xl font-bold text-lg hover:bg-on-primary-fixed-variant transition-all scale-100 active:scale-[0.98] duration-200 mt-4" type="submit">
          Login
        </button>
      </form>
    </div>
    <!-- Right Side: Quick Login / PIN -->
    <div class="flex-1 bg-surface-container-low p-10 md:p-16 flex flex-col justify-center">
      <div class="text-center mb-10">
        <span class="material-symbols-outlined text-4xl text-secondary mb-4" data-icon="pin">pin</span>
        <h2 class="text-on-surface text-2xl font-extrabold tracking-tight">Quick Login</h2>
        <p class="text-on-surface-variant text-sm font-medium mt-2">Active terminal staff PIN access</p>
      </div>
      <div class="grid grid-cols-3 gap-4 max-w-xs mx-auto">
        <!-- PIN Pad -->
        <button class="bg-surface-container-lowest text-on-surface aspect-square rounded-xl font-black text-xl hover:bg-surface-bright transition-colors">1</button>
        <button class="bg-surface-container-lowest text-on-surface aspect-square rounded-xl font-black text-xl hover:bg-surface-bright transition-colors">2</button>
        <button class="bg-surface-container-lowest text-on-surface aspect-square rounded-xl font-black text-xl hover:bg-surface-bright transition-colors">3</button>
        <button class="bg-surface-container-lowest text-on-surface aspect-square rounded-xl font-black text-xl hover:bg-surface-bright transition-colors">4</button>
        <button class="bg-surface-container-lowest text-on-surface aspect-square rounded-xl font-black text-xl hover:bg-surface-bright transition-colors">5</button>
        <button class="bg-surface-container-lowest text-on-surface aspect-square rounded-xl font-black text-xl hover:bg-surface-bright transition-colors">6</button>
        <button class="bg-surface-container-lowest text-on-surface aspect-square rounded-xl font-black text-xl hover:bg-surface-bright transition-colors">7</button>
        <button class="bg-surface-container-lowest text-on-surface aspect-square rounded-xl font-black text-xl hover:bg-surface-bright transition-colors">8</button>
        <button class="bg-surface-container-lowest text-on-surface aspect-square rounded-xl font-black text-xl hover:bg-surface-bright transition-colors">9</button>
        <button class="bg-surface-container-lowest text-error aspect-square rounded-xl font-bold text-sm hover:bg-error-container transition-colors">CLEAR</button>
        <button class="bg-surface-container-lowest text-on-surface aspect-square rounded-xl font-black text-xl hover:bg-surface-bright transition-colors">0</button>
        <button (click)="onLogin()" class="bg-secondary text-on-secondary aspect-square rounded-xl flex items-center justify-center hover:bg-on-secondary-fixed-variant transition-colors">
          <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
        </button>
      </div>
      <div class="mt-12 text-center">
        <div class="inline-flex items-center gap-2 bg-secondary-fixed px-4 py-2 rounded-full">
          <span class="material-symbols-outlined text-sm" data-icon="sensors">sensors</span>
          <span class="text-[0.7rem] font-bold uppercase tracking-widest text-on-secondary-fixed">Tap Staff NFC Card</span>
        </div>
      </div>
    </div>
  </div>
</main>
<app-footer></app-footer>
